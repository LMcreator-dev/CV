<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" role="img" aria-labelledby="title desc">
  <title id="title">Python para principiantes</title>
  <desc id="desc">Badge visual for Python beginner certification</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b79c2" />
      <stop offset="100%" stop-color="#31a06e" />
    </linearGradient>
  </defs>
  <rect x="1.5" y="1.5" width="117" height="117" rx="18" fill="url(#bg)" stroke="#1b5f90" stroke-width="3" />
  <rect x="12" y="12" width="96" height="30" rx="10" fill="#ffffff" fill-opacity="0.92" />
  <text x="60" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#0b5f98">MICROSOFT</text>
  <rect x="12" y="48" width="96" height="58" rx="10" fill="#ffffff" fill-opacity="0.16" />
  <text x="60" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#f4fcff">PYTHON</text>
  <text x="60" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#d8f6e8">BEGINNER</text>
