  <text x="60" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#0a66c2">DOCKER</text>
  <rect x="12" y="48" width="96" height="58" rx="10" fill="#ffffff" fill-opacity="0.14" />
